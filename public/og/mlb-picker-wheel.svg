<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="MLB Picker Wheel">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="180" fill="#ffffff" fill-opacity="0.08"/>
  <circle cx="220" cy="520" r="140" fill="#ffffff" fill-opacity="0.06"/>
  <text x="600" y="220" fill="#dbeafe" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="6" text-anchor="middle">PICKER WHEEL</text>
  <text x="600" y="320" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" text-anchor="middle">MLB Picker Wheel</text>
